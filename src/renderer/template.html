<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page {
    size: letter;
    margin: {{PAGE_MARGINS}};
    {{PAGE_NUMBER_CSS}}
  }
  @media print {
    .page-break { page-break-after: always; }
    .doc-header { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; border-bottom: 1px solid #000; padding-bottom: 4pt; }
    .doc-footer { position: fixed; bottom: 0; left: 0; right: 0; border-top: 1px solid #000; padding-top: 4pt; }
    body:has(.doc-header) main { margin-top: 40pt; }
  }
  body {
    font-family: 'Times New Roman', Times, serif;
    font-size: 12pt;
  }
  .doc-header {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #000;
    padding-bottom: 4pt;
    margin-bottom: 12pt;
  }
  .header-center { text-align: center; flex: 1; }
  .header-right { text-align: right; }
  .doc-footer {
    text-align: center;
    border-top: 1px solid #000;
    padding-top: 4pt;
    margin-top: 12pt;
  }
  .para-num { margin-right: 6pt; }
  h2, h3 { margin-top: 0; }
</style>
</head>
<body>
{{HEADER}}
<main>
{{BODY}}
</main>
{{FOOTER}}
</body>
</html>
