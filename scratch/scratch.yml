---
defaults:
  case_number: FC-00-00000000-0000
  date: 01JAN26
  author:
    role: Respondent
    name: John Doe
  features:
    - page_number
    - case_number
    - date
    - author
  format:
    defaults:
      pt: 12
      bold: false
      italic: false
      spacing:
        between: 12 # Spacing between lines of the same section
        after: 12 # Spacing after this section
        before: true # override the previous sections spacing
    title:
      pt: 14
      bold: true
documents:
  17C_Schedule_A:
    title: 17C Schedule A
    content:
      - type: heading
        content: A Section heading
      - type: subheading
        content: A subheading
      - a paragraph
      - type: paragraph
        content: another paragraph
        id: important_paragraph
      - content: "`type: paragraph` is not needed"
      - content:
        - content can be an array too
        - the lines simply get concated
        - this is useful for when you want to refrence another paragraph
        - type: refrence
          ref: "@important_paragraph"
        - the above entry would output the paragraph number of important_paragraph
  17C_Schedule_B:
    title: 17C Schedule A
    content:
      - type: heading
        content: A Section heading
      - type: subheading
        content: A subheading
      - content:
        - you can reference paragraphs in other documents too
        - type: refrence
          ref: "@17C_Schedule_A/important_paragraph"
          content:
            - var: author
              space_after: false
            - "'s"
            - var: title
            - "dated"
            - var: date
              space_after: false
            - ", paragraph #"
            - var: paragraph
              space_before: false
        - the above entry would look like "John Doe's 17C Schedule A dated 01JAN26"